version: "2"
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
    - gocyclo
    - misspell
    - unused
    - ineffassign
  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
  exclusions:
    rules:
      - linters:
          - gosec
        text: "G204|G304|G306"
run:
  timeout: 3m
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
